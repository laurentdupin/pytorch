    FINALIZE: ACC
  shader_variants:
    - NAME: buffer_sum_dim
      INIT: "0.0"
      REDUCE: ACC + X
      FINALIZE: ACC
    - NAME: buffer_mean_dim
      INIT: "0.0"
      REDUCE: ACC + X
      FINALIZE: ACC / max(LEN, 1.0)
