name: linux-build-osdc

on:
  workflow_call:
    inputs:
      build-environment:
        required: true
        type: string
        description: Top-level label for what's being built/tested.
      docker-image-name:
        required: true
        type: string
        description: Name of the base docker image to build with.
      build-generates-artifacts:
        required: false
        type: boolean
        default: true
        description: If set, upload generated build artifacts.
      sync-tag:
        required: false
        type: string
        default: ""
        description: |
          If this is set, our linter will use this to make sure that every other
          job with the same `sync-tag` is identical.
      cuda-arch-list:
        required: false
        type: string
        default: "7.5"
        description: |
          List of CUDA architectures CI build should target.
      runner_prefix:
        required: false
        default: ""
        type: string
        description: Prefix for runner label
      runner:
        required: false
        type: string
        default: "mt-l-x86iamx-32-128"
        description: |
          Label of the runner this job should run on.
      test-matrix:
        required: false
        type: string
        description: |
          An option JSON description of what test configs to run later on. This
          is moved here from the Linux test workflow so that we can apply filter
          logic using test-config labels earlier and skip unnecessary builds
      selected-test-configs:
        description: |
          A comma-separated list of test configurations from the test matrix to keep,
          The empty list means we are going to keep every configurations by defaults
        required: false
        type: string
        default: ""
      s3-bucket:
        description: S3 bucket to download artifact
        required: false
        type: string
        default: "gha-artifacts"
      aws-role-to-assume:
        description: Role to assume for downloading artifacts
        required: false
        type: string
        default: ""
      disable-monitor:
        description: |
          Disable utilization monitoring for build job
        required: false
        type: boolean
        default: false
      monitor-log-interval:
        description: |
          Set the interval for the monitor script to log utilization.
        required: false
        type: number
        default: 5
      monitor-data-collect-interval:
        description: |
          Set the interval for the monitor script to collect data.
        required: false
        type: number
        default: 1
      allow-reuse-old-whl:
        description: |
          If set, the build try to pull an old wheel from s3 that was built on a
          commit with no cpp changes from this commit
        required: false
        type: boolean
        default: true
      build-additional-packages:
        description: |
          If set, the build job will also builds these packages and saves their
          wheels as artifacts
        required: false
        type: string
        default: ""
      build-external-packages:
        description: |
          If set, the build external packages and saves their wheels as artifacts
          use command separated list of packages to build ex: 'vllm,transformers'.
        required: false
        type: string
        default: ""

    secrets:
      HUGGING_FACE_HUB_TOKEN:
        required: false
        description: |
          HF Auth token to avoid rate limits when downloading models or datasets from hub
      SCRIBE_GRAPHQL_ACCESS_TOKEN:
        required: false
        description: |
          FB app token to write to scribe endpoint

    outputs:
      docker-image:
        value: ${{ inputs.docker-image-name }}
        description: The docker image containing the built PyTorch.
      test-matrix:
        value: ${{ jobs.build.outputs.test-matrix }}
        description: An optional JSON description of what test configs to run later on.
      build-environment:
        value: ${{ jobs.build.outputs.build-environment }}
        description: Top-level label for what's being built/tested.

jobs:
  build:
    permissions:
      id-token: write
      contents: read
      actions: read
    environment: ${{ github.ref == 'refs/heads/main' && 'scribe-protected' || startsWith(github.ref, 'refs/heads/release/') && 'scribe-protected' || contains(github.event.pull_request.labels.*.name, 'ci-scribe') && 'scribe-pr' || '' }}
    # Don't run on forked repos
    if: github.repository_owner == 'pytorch'
    runs-on: ${{ inputs.runner_prefix}}${{ inputs.runner }}
    container:
      image: ${{ inputs.docker-image-name }}
    timeout-minutes: 480
    outputs:
      docker-image: ${{ inputs.docker-image-name }}
      test-matrix: ${{ steps.filter.outputs.test-matrix }}
      build-environment: ${{ inputs.build-environment }}
    steps:
      - name: Fix Git ownership
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout PyTorch
        uses: pytorch/pytorch/.github/actions/checkout-pytorch@main
        with:
          no-sudo: true
          checkout-mode: treeless

      - name: Setup Linux OSDC
        uses: pytorch/pytorch/.github/actions/setup-linux-osdc@huydhn/setup-linux-osdc
        with:
          build-environment: ${{ inputs.build-environment }}

      - name: Get workflow job id
        id: get-job-id
        uses: pytorch/pytorch/.github/actions/get-workflow-job-id@main
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if can use old whl build
        id: use-old-whl
        uses: pytorch/pytorch/.github/actions/reuse-old-whl@main
        if: ${{ inputs.allow-reuse-old-whl }}
        with:
          build-environment: ${{ inputs.build-environment }}
          run-id: ${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          job-id: ${{ steps.get-job-id.outputs.job-id }}
          job-name: ${{ steps.get-job-id.outputs.job-name }}

      - name: Parse ref
        id: parse-ref
        run: .github/scripts/parse_ref.py

      # Apply the filter logic to the build step too if the test-config label is already there
      - name: Select all requested test configurations (if the test matrix is available)
        id: filter
        uses: pytorch/pytorch/.github/actions/filter-test-configs@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-matrix: ${{ inputs.test-matrix }}
          selected-test-configs: ${{ inputs.selected-test-configs }}
          job-name: ${{ steps.get-job-id.outputs.job-name }}

      - name: Start monitoring script
        id: monitor-script
        if: ${{ !inputs.disable-monitor }}
        shell: bash
        continue-on-error: true
        env:
          JOB_ID: ${{ steps.get-job-id.outputs.job-id }}
          JOB_NAME: ${{ steps.get-job-id.outputs.job-name }}
          WORKFLOW_NAME: ${{ github.workflow }}
          WORKFLOW_RUN_ID: ${{github.run_id}}
          MONITOR_LOG_INTERVAL: ${{ inputs.monitor-log-interval }}
          MONITOR_DATA_COLLECT_INTERVAL: ${{ inputs.monitor-data-collect-interval }}
        run: |
          mkdir -p ../../usage_logs
          uv pip install psutil==5.9.8 dataclasses_json==0.6.7
          python3 -m tools.stats.monitor \
          --log-interval "$MONITOR_LOG_INTERVAL" \
          --data-collect-interval "$MONITOR_DATA_COLLECT_INTERVAL" \
          > "../../usage_logs/usage_log_build_${JOB_ID}.txt" 2>&1 &
          echo "monitor-script-pid=${!}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1

      - name: Download pytest cache
        uses: pytorch/pytorch/.github/actions/pytest-cache-download@main
        continue-on-error: true
        if: steps.use-old-whl.outputs.reuse != 'true'
        with:
          cache_dir: .pytest_cache
          job_identifier: ${{ github.workflow }}_${{ inputs.build-environment }}
          s3_bucket: ${{ inputs.s3-bucket }}

      - name: Build
        if: (steps.filter.outputs.is-test-matrix-empty == 'False' || inputs.test-matrix == '') && steps.use-old-whl.outputs.reuse != 'true'
        id: build
        env:
          BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
          BRANCH: ${{ steps.parse-ref.outputs.branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
          SCCACHE_BUCKET: ossci-compiler-cache-circleci-v2
          SCCACHE_REGION: us-east-1
          XLA_CLANG_CACHE_S3_BUCKET_NAME: ossci-compiler-clang-cache-circleci-xla
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          TORCH_CUDA_ARCH_LIST: ${{ inputs.cuda-arch-list }}
          XLA_CUDA: ${{ contains(inputs.build-environment, 'xla') && '0' || '' }}
          OUR_GITHUB_JOB_ID: ${{ steps.get-job-id.outputs.job-id }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
          SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.SCRIBE_GRAPHQL_ACCESS_TOKEN }}
          BUILD_ADDITIONAL_PACKAGES: ${{ inputs.build-additional-packages }}
          RUNNER: ${{ inputs.runner }}
          SKIP_SCCACHE_INITIALIZATION: 1
        shell: bash
        run: |
          START_TIME=$(date +%s)
          .ci/pytorch/build.sh
          END_TIME=$(date +%s)
          echo "build_time=$((END_TIME - START_TIME))" >> "$GITHUB_OUTPUT"

      - name: Build external packages
        id: build-external-packages
        if: inputs.build-external-packages != '' &&  steps.build.outcome != 'skipped'
        uses: pytorch/pytorch/.github/actions/build-external-packages@main
        with:
          build-targets: ${{ inputs.build-external-packages }}
          docker-image: ${{ inputs.docker-image-name }}
          cuda-arch-list: ${{ inputs.cuda-arch-list }}
          output-dir: external

      - name: Move external packages to dist
        if: steps.build-external-packages.outputs.output_dir != '' && steps.build-external-packages.outcome != 'skipped'
        shell: bash
        run: |
          src="${{ steps.build-external-packages.outputs.output_dir }}"
          if [ -d "$src" ]; then
            mkdir -p "dist/$(dirname "$src")"
            mv "$src" "dist/$(dirname "$src")/"
          fi

      - name: Stop monitoring script
        if: ${{ always() && steps.monitor-script.outputs.monitor-script-pid }}
        shell: bash
        continue-on-error: true
        env:
          MONITOR_SCRIPT_PID: ${{ steps.monitor-script.outputs.monitor-script-pid }}
        run: |
          kill "$MONITOR_SCRIPT_PID"

      - name: Archive artifacts into zip
        if: inputs.build-generates-artifacts && steps.build.outcome != 'skipped' && steps.use-old-whl.outputs.reuse != 'true'
        run: |
          zip -1 -r artifacts.zip dist/ build/custom_test_artifacts build/lib build/bin .additional_ci_files

      - name: Store PyTorch Build Artifacts on S3
        uses: seemethere/upload-artifact-s3@baba72d0712b404f646cebe0730933554ebce96a # v5.1.0
        if: inputs.build-generates-artifacts && (steps.build.outcome != 'skipped' || steps.use-old-whl.outputs.reuse == 'true')
        with:
          name: ${{ inputs.build-environment }}
          retention-days: 14
          if-no-files-found: error
          path: artifacts.zip
          s3-bucket: ${{ inputs.s3-bucket }}

      - name: copy logs
        shell: bash
        if: ${{ always() && steps.build.outcome != 'skipped' && !inputs.disable-monitor }}
        continue-on-error: true
        run: |
          rm -f ./usage_logs
          mkdir -p ./usage_logs
          cp ../../usage_logs/usage_log_build_*.txt ./usage_logs/

      - name: Upload raw usage log to s3
        if: ${{ always() && steps.build.outcome != 'skipped' && !inputs.disable-monitor }}
        uses: seemethere/upload-artifact-s3@v5
        with:
          s3-prefix: |
            ${{ github.repository }}/${{ github.run_id }}/${{ github.run_attempt }}/artifact
          retention-days: 14
          if-no-files-found: warn
          path: usage_logs/usage_log_build_*.txt

      - name: Upload sccache stats
        if: steps.build.outcome != 'skipped'
        uses: pytorch/pytorch/.github/actions/upload-sccache-stats@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-time: ${{ steps.build.outputs.build_time }}

      - name: Upload utilization stats
        if: ${{ always() && steps.build.outcome != 'skipped' && !inputs.disable-monitor }}
        continue-on-error: true
        uses: pytorch/pytorch/.github/actions/upload-utilization-stats@main
        with:
          job_id: ${{ steps.get-job-id.outputs.job-id }}
          job_name: ${{ steps.get-job-id.outputs.job-name }}
          workflow_name: ${{ github.workflow }}
          workflow_run_id: ${{github.run_id}}
          workflow_attempt: ${{github.run_attempt}}
          artifact_prefix: usage_log_build_${{ steps.get-job-id.outputs.job-id }}
